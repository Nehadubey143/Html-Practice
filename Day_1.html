<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Ordered List Example</h3>
    <ol>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ol>
    <h3>Unordered List Example</h3>
    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ul>
    <h3>Alphabetical List (Lowercase)</h3>
    <ol type="a">
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ol>
    <h3>Alphabetical List (Uppercase)</h3>
    <ol type="A">
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ol>
</body>
</html>
