Ctrl + D

CSS Box Model
Every HTML element follows the Box Model.

📌 Box Model Structure
1. Content
2. Padding
3. Border
4. Margin


📘 Definition
Margin:
Space outside the border.

Padding:
Space inside the border (around content).

Border:
Outline around the element.


🔹 Box Model Code -->
<!DOCTYPE html>
<html>
<head>
  <title>Box Model</title>

  <style>
    div {
      background-color: lightblue;
      padding: 20px;
      border: 5px solid blue;
      margin: 40px;
      width: 200px;
    }
  </style>
</head>

<body>

  <div>
    This is Box Model Example
  </div>

</body>
</html>
