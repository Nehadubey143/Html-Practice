<!-- 📘 DAY 4 – Website Structure
📌 Concept
A basic website is divided into three main sections:
Navbar
Main / Hero Section
Footer

These sections are created using semantic HTML tags.

✅ Code: Website Structure -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
</head>
<body>

    <nav>
        <!-- Navigation bar -->
        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Contact Us</li>
        </ul>
    </nav>

    <main>
        <!-- Main / Hero section -->
        <h1>This is main section</h1>
        <h1>This is hero section</h1>
    </main>

    <footer>
        <!-- Footer section -->
        <ul>
            <li>Our Mission</li>
            <li>Our Vision</li>
            <li>Privacy Policy</li>
        </ul>
    </footer>

    <ujwal>
        this is ujwal
    </ujwal>
    <!-- Custom tag (non-semantic) -->

</body>
</html>




<!-- Semantic vs Non-Semantic Tags
📘 Definitions
Semantic Tags:
Tags that have their own meaning.
They clearly describe their purpose.

Examples:
nav, main, footer, header, section, article

Non-Semantic Tags:
Tags that do not describe their purpose.

Examples:
div, span, p, custom tags -->
